services:
  - type: web
    name: campus-bites-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: DATABASE_URL
        value: sqlite:///./campus_bites.db
      - key: CORS_ORIGINS
        value: '["http://localhost:3000","http://127.0.0.1:3000","https://campus-bites-api.vercel.app"]'
